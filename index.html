<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EG Study Scheduler - Setup</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#8b5cf6">
</head>
<body>
    <div class="container">
        <header>
            <h1>EG Scheduler</h1>
        </header>
        
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Setup your engineering study plan. Enter your syllabus topics to automatically generate a smart daily schedule.</p>
        
        <form id="syllabus-form">
            <div id="subjects-container">
                <!-- Subject Cards generated by JS -->
            </div>
            
            <button type="submit" class="btn" style="margin-bottom: 3rem;">Generate Study Plan</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="./storage.js"></script>
    <script src="./app.js"></script>
</body>
</html>
